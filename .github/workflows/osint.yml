name: OSINT X-RAY

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  tarama:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: OSINT taramasını çalıştır
        run: python osint.py

      - name: Raporu artefact olarak kaydet
        uses: actions/upload-artifact@v3
        with:
          name: osint-raporu
          path: osint_rapor.json
